[build]
  # Kein Build-Prozess erforderlich, da wir nur HTML servieren
  command = "echo 'No build required'"
  publish = "media"

[build.environment]
  NODE_VERSION = "18"

# Header für Sicherheit und Performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Spezifische Header für HTML
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Hauptseite auf confirmation.html weiterleiten
[[redirects]]
  from = "/"
  to = "/confirmation.html"
  status = 200

# Weitere Weiterleitungen
[[redirects]]
  from = "/confirm"
  to = "/confirmation.html"
  status = 200

[[redirects]]
  from = "/success"
  to = "/confirmation.html"
  status = 200

# 404-Seite
[[redirects]]
  from = "/*"
  to = "/confirmation.html"
  status = 404